services:
  app:
    build: .
    container_name: restaurant-voice-agent
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - ANONYMIZED_TELEMETRY=False
      - TRANSFORMERS_NO_TF=1
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s